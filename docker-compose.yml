version: '3'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - guestbook-network

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    networks:
      - guestbook-network

volumes:
  redis-data:

networks:
  guestbook-network:
    driver: bridge
